<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAcc</title>
    <link rel="stylesheet" href="style/catalog.css">

    <link href="https://fonts.googleapis.com/css2?family=Marmelad&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="logo">
        <img src="data/pharma.png">
        <a href="index.html">MedAcc</a>
    </div>

    <div class="user">
        <img src="data/user.png" alt="">
    </div>
</header>

<main class="container">

    <aside class="sidebar">
        <p id="tittle">Каталог</p>

        <p class="price-title">Ціна</p>
        <div class="price-range">
            <span id="minPrice">0</span>
            <span>5000</span>
        </div>
        <input type="range" id="priceRange" min="0" max="5000" value="0">

        <div class="categories">
            <button>+Ліки та профілактичні засоби</button>
            <button>+Вітаміни та мінерали</button>
            <button>+Краса та догляд</button>
            <button>+Спорт та здоров’я</button>
            <button>+Товари для дітей та мам</button>
            <button>+Ортопедія та реабілітація</button>
            <button>+Медична техніка</button>
            <button>+Зоотовари</button>
        </div>
    </aside>

    <section class="content">
        <div class="search">
            <input type="text" placeholder="Назва лікарського засобу">
            <button>
                <img src="data/search.png" alt="">
            </button>
        </div>
        <div class="products" id="products"></div>
    </section>

</main>

<script src="JavaScript/catalog.js"></script>

</body>
</html>
