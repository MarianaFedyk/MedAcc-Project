<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAcc</title>
    <link rel="stylesheet" href="style/catalog.css">

    <link href="https://fonts.googleapis.com/css2?family=Marmelad&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="logo">
        <img src="data/pharma.png">
        <a href="index.html">MedAcc</a>
    </div>

    <div class="user">
        <img src="data/user.png" alt="">
    </div>
</header>

<main class="container">

    <aside class="sidebar">
        <p id="tittle">Каталог</p>

        <p class="price-title">Ціна</p>
        <div class="price-range">
            <span id="minPrice">0</span>
            <span>2500</span>
        </div>
        <input type="range" id="priceRange" min="0" max="2500" value="300">

        <div class="categories">
            <button data-id="1">+Ліки та профілактичні засоби</button>
            <button data-id="2">+Вітаміни та мінерали</button>
            <button data-id="3">+Краса та догляд</button>
            <button data-id="4">+Спорт та здоров’я</button>
            <button data-id="5">+Товари для дітей та мам</button>
            <button data-id="6">+Ортопедія та реабілітація</button>
            <button data-id="7">+Медична техніка</button>
            <button data-id="8">+Зоотовари</button>
        </div>
    </aside>

    <section class="content">
        <div class="search">
        <input type="text" id="searchInput" placeholder="Назва лікарського засобу">
        <button id="searchBtn">
        <img src="data/search.png" alt="">
        </button>
</div>
        <div class="products" id="products"></div>
        <button id="loadMoreBtn">Ще</button>
    </section>

</main>

<script src="JavaScript/catalog.js"></script>

</body>
</html>
